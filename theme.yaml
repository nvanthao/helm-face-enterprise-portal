# theme.yaml — Enterprise Portal v2 Branding & Appearance
# ======================================================
#
# Place this file at the root of your content repo (or at path_prefix + theme.yaml),
# alongside toc.yaml. If a theme.yaml is present, it becomes the sole source of
# branding — UI-configured values in the Vendor Portal are ignored entirely.
# If no theme.yaml exists, UI-configured branding is used as-is.
#
# This example demonstrates a dark, warm-toned theme inspired by modern dev portals.

branding:
  title: "Plotnotes"
  overview: "Welcome to the Plotnotes Enterprise Portal."
  contact: support@plotnotes.io
  supportPortalLink: https://support.plotnotes.io

  # Core colors — warm coral accent
  primaryColor: "#D4583B"
  secondaryColor: "#E8654A"

  # Link colors
  linkColor: "#D4583B"
  linkHoverColor: "#E8856A"

  # Header background
  background: minimal

  # Dark header
  headerColor: "#141414"
  headerGradientEnd: "#1a1a1a"

  # Dark sidebar
  sidebarColor: "#141414"
  sidebarGradientEnd: "#1a1a1a"

  # Dark content area
  contentBackgroundColor: "#1a1a1a"
  contentBackgroundGradientEnd: "#1a1a1a"

customCSS: |
  /* Dark content area with light text */
  main, main article, main .markdown-content {
    background-color: #1a1a1a !important;
    color: #d4d4d4 !important;
  }

  /* White headings */
  main h1, main h2, main h3, main h4 {
    color: #ffffff !important;
  }

  /* Muted body text */
  main p, main li, main td, main th, main label, main legend, main span, main fieldset {
    color: #a3a3a3 !important;
  }

  /* Table header */
  main thead th {
    background-color: #2a2a2a !important;
    color: #ffffff !important;
  }

  /* Bold text */
  main strong {
    color: #ffffff !important;
  }

  /* Coral links */
  main a {
    color: #D4583B !important;
  }
  main a:hover {
    color: #E8856A !important;
  }

  /* Muted sidebar links with coral active/hover */
  nav.w-72 a {
    color: #8a8a8a !important;
  }
  nav.w-72 a:hover,
  nav.w-72 a[data-active="true"] {
    color: #D4583B !important;
  }

  /* Dark form elements */
  main select, main input[type="text"], main .portal-input, main .portal-select {
    background-color: #2a2a2a !important;
    color: #d4d4d4 !important;
    border-color: #404040 !important;
  }
  main input[type="radio"] {
    accent-color: #D4583B;
  }

  /* Dark code blocks */
  main code {
    background-color: #2a2a2a !important;
    color: #d4d4d4 !important;
  }
  main pre {
    background-color: #0f0f0f !important;
  }

  /* Warm gradient at top of content area */
  .docs-content-wrapper {
    position: relative;
  }
  .docs-content-wrapper::before {
    content: '';
    position: absolute;
    top: 0;
    left: 18rem;
    right: 0;
    height: 300px;
    background: linear-gradient(to bottom, rgba(212, 88, 59, 0.15), transparent);
    pointer-events: none;
    z-index: 10;
  }

  /* Grid overlay on content area */
  .docs-content-wrapper::after {
    content: '';
    position: absolute;
    top: 0;
    left: 18rem;
    right: 0;
    bottom: 0;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: linear-gradient(to bottom, white 0%, transparent 60%);
    -webkit-mask-image: linear-gradient(to bottom, white 0%, transparent 60%);
    pointer-events: none;
    z-index: 10;
  }
